<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nianming_nav - 个人导航站</title>
    <meta name="description" content="简洁高效的个人导航站，支持分类管理、多引擎搜索、主题切换" />
    <style>
      .app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #ffffff;
        color: #0f172a;
        z-index: 9999;
      }
      @media (prefers-color-scheme: dark) {
        .app-splash {
          background: #0f172a;
          color: #e5e7eb;
        }
      }
      .app-splash__logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
      }
      .app-splash__spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(59, 130, 246, 0.2);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: app-splash-spin 0.8s linear infinite;
      }
      .app-splash__text {
        margin: 0;
        font-size: 0.875rem;
        opacity: 0.7;
      }
      @keyframes app-splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-splash" aria-hidden="true">
        <div class="app-splash__logo">念</div>
        <div class="app-splash__spinner"></div>
        <p class="app-splash__text">正在加载导航站…</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
